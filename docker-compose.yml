services:
  fastapi:
    image: ghcr.io/liante0904/ssh-reports-hub-fastapi:latest
    build: .
    container_name: ssh-reports-hub-fastapi-prod
    user: "1001:1001"
    ports:
      - "8004:8000"
    volumes:
      - .:/app
      - /home/ubuntu/sqlite3:/data
      - /home/ubuntu/prod/telegram-stock-info-bot/send:/screening_files:ro
      - /home/ubuntu/prod/ssh-reports-scraper/logs:/logs/scraper:ro
      - /home/ubuntu/logs:/logs/main:ro
    command: ["/opt/venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - DB_BACKEND=postgres
      - SQLITE_DB_PATH=/data/telegram.db
      - TZ=Asia/Seoul
    restart: always
    networks:
      - public-net

networks:
  public-net:
    external: true
