services:
  ssh-reports-hub-fastapi-blue:
    image: ghcr.io/liante0904/ssh-reports-hub-fastapi:latest
    build:
      context: .
      args:
        INSTALL_SSH_LIBRARY: ${INSTALL_SSH_LIBRARY:-0}
      additional_contexts:
        ssh_library: ../../../../lib/ssh-library
    container_name: ssh-reports-hub-fastapi-blue
    user: "1001:1001"
    expose:
      - "8000"
    volumes:
      - .:/app
      - /home/ubuntu/workspace/lib/ssh-library:/opt/ssh-library:ro
      - /home/ubuntu/legacy/telegram-stock-info-bot/send:/screening_files:ro
      - /home/ubuntu/workspace/external.reports-hub/apps/backend/ssh-reports-hub-fastAPI/logs:/logs/scraper:ro
      - /home/ubuntu/logs:/logs/main:ro
    command: ["/opt/venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - TZ=Asia/Seoul
      - PYTHONPATH=/opt/venv/lib/python3.12/site-packages:/opt/ssh-library/src
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
    restart: always
    networks:
      - public-net
    depends_on:
      - redis

  ssh-reports-hub-fastapi-green:
    image: ghcr.io/liante0904/ssh-reports-hub-fastapi:latest
    build:
      context: .
      args:
        INSTALL_SSH_LIBRARY: ${INSTALL_SSH_LIBRARY:-0}
      additional_contexts:
        ssh_library: ../../../../lib/ssh-library
    container_name: ssh-reports-hub-fastapi-green
    user: "1001:1001"
    expose:
      - "8000"
    volumes:
      - .:/app
      - /home/ubuntu/workspace/lib/ssh-library:/opt/ssh-library:ro
      - /home/ubuntu/legacy/telegram-stock-info-bot/send:/screening_files:ro
      - /home/ubuntu/workspace/external.reports-hub/apps/backend/ssh-reports-hub-fastAPI/logs:/logs/scraper:ro
      - /home/ubuntu/logs:/logs/main:ro
    command: ["/opt/venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - TZ=Asia/Seoul
      - PYTHONPATH=/opt/venv/lib/python3.12/site-packages:/opt/ssh-library/src
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_DB=${REDIS_DB:-0}
    restart: always
    networks:
      - public-net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: ssh-reports-hub-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - public-net

volumes:
  redis_data:

networks:
  public-net:
    external: true
