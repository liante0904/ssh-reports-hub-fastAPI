services:
  fastapi:
    build: .
    container_name: ssh-private-hub-fastAPI-pvt
    user: "1001:1001"
    ports:
      - "8002:8000"
    volumes:
      - .:/app
      - /home/ubuntu/sqlite3:/data
    command: ["/opt/venv/bin/uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - APP_ENV=${APP_ENV:-prod}
      - DB_BACKEND=postgres
      - SQLITE_DB_PATH=/data/telegram.db
      - TZ=Asia/Seoul
    restart: always
    networks:
      - public-net

networks:
  public-net:
    external: true
