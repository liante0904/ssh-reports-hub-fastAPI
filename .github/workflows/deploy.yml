name: Build and Deploy FastAPI to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ssh-reports-hub-fastapi

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run Tests
        # 모킹된 테스트를 실행하여 CI 환경에서 로직 무결성을 검증합니다.
        run: uv run pytest tests/test_api_mocked.py

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=prod
            type=sha,format=short

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          EXPECTED_SHA: ${{ github.sha }}
          REPO_NAME: ${{ github.event.repository.name }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: EXPECTED_SHA,REPO_NAME,REPO_OWNER
          script: |
            set -eu
            python3 ~/secrets/deploy_prepare.py \
              --dir  "/home/ubuntu/workspace/external.reports-hub/apps/backend/$REPO_NAME" \
              --repo "git@github.com:$REPO_OWNER/$REPO_NAME.git" \
              --sha  "$EXPECTED_SHA" \
              --app  "reports-hub"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            cd "/home/ubuntu/workspace/external.reports-hub/apps/backend/$REPO_NAME"
            docker compose pull
            docker compose up -d --no-build --force-recreate
            # 대소문자 문제 해결: 이름을 소문자로 변환
            CONTAINER_NAME=$(echo "$REPO_NAME-prod" | tr '[:upper:]' '[:lower:]')

            RUNNING_SHA="$(docker inspect "$CONTAINER_NAME" --format '{{ index .Config.Labels `org.opencontainers.image.revision` }}')"
            echo "Successfully deployed revision: $RUNNING_SHA"
            docker image prune -f
